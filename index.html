<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Universal Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-blue { box-shadow: 0 0 20px rgba(0, 122, 255, 0.3); }
        input { background: rgba(255,255,255,0.1) !important; color: white !important; border: 1px solid rgba(255,255,255,0.2) !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full grid md:grid-cols-2 gap-8">
        
        <div class="glass p-8 rounded-[32px] space-y-6">
            <div>
                <h2 class="text-2xl font-bold mb-1">Configuration</h2>
                <p class="text-gray-400 text-sm">Set your local data source & alarm.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold uppercase text-gray-500 mb-2 block">Target URL</label>
                    <input id="target-url" type="text" placeholder="https://your-school-board.com/alerts" class="w-full p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="text-xs font-bold uppercase text-gray-500 mb-2 block">Trigger Keyword</label>
                    <input id="keyword" type="text" placeholder="Cancelled" class="w-full p-3 rounded-xl outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-500 mb-2 block">Alarm Time</label>
                        <input id="alarm-time" type="time" class="w-full p-3 rounded-xl outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold uppercase text-gray-500 mb-2 block">Scan Time</label>
                        <input id="scan-time" type="time" value="05:45" class="w-full p-3 rounded-xl outline-none">
                    </div>
                </div>

                <button onclick="saveSettings()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition glow-blue">Save & Sync</button>
            </div>
        </div>

        <div class="glass p-8 rounded-[32px] flex flex-col justify-between border-blue-500/30">
            <div class="flex justify-between items-start">
                <div>
                    <p id="current-date" class="text-blue-500 font-bold text-xs uppercase tracking-widest"></p>
                    <h3 class="text-4xl font-light mt-1" id="clock">00:00:00</h3>
                </div>
                <div id="alarm-badge" class="px-3 py-1 bg-green-500/20 text-green-500 rounded-full text-[10px] font-black uppercase">Alarm Armed</div>
            </div>

            <div class="py-10 text-center">
                <div id="status-display" class="text-gray-500 italic">Waiting for scheduled scan...</div>
                <div id="result-text" class="text-2xl font-bold mt-2"></div>
            </div>

            <div class="space-y-3">
                <button onclick="manualScan()" class="w-full border border-white/20 hover:bg-white/5 py-3 rounded-xl text-sm font-medium transition">Run Manual Test Scan</button>
                <p class="text-[10px] text-center text-gray-600 italic">Note: Real-world scraping requires a proxy to bypass CORS security.</p>
            </div>
        </div>
    </div>

    <script>
        // Clock Function
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
            document.getElementById('current-date').innerText = now.toDateString();
        }, 1000);

        // Load Saved Data
        window.onload = () => {
            document.getElementById('target-url').value = localStorage.getItem('snowday_url') || 'https://geoquery.npssts.ca/Alerts';
            document.getElementById('keyword').value = localStorage.getItem('snowday_key') || 'Cancelled';
            document.getElementById('alarm-time').value = localStorage.getItem('snowday_alarm') || '07:00';
        };

        function saveSettings() {
            localStorage.setItem('snowday_url', document.getElementById('target-url').value);
            localStorage.setItem('snowday_key', document.getElementById('keyword').value);
            localStorage.setItem('snowday_alarm', document.getElementById('alarm-time').value);
            alert("Settings saved to browser storage!");
        }

        async function manualScan() {
            const status = document.getElementById('status-display');
            const result = document.getElementById('result-text');
            const badge = document.getElementById('alarm-badge');
            const keyword = document.getElementById('keyword').value;

            status.innerText = "Connecting to source...";
            result.innerText = "";
            
            // Simulation of Scraper Logic
            setTimeout(() => {
                status.innerText = `Scanning for "${keyword}"...`;
                
                setTimeout(() => {
                    // Logic: If keyword found, KILL the alarm
                    const found = true; // In demo, we assume success
                    
                    if(found) {
                        status.innerText = "MATCH FOUND";
                        result.innerHTML = `<span class="text-red-500 uppercase">${keyword} DETECTED</span>`;
                        badge.innerText = "ALARM DEACTIVATED";
                        badge.className = "px-3 py-1 bg-red-500/20 text-red-500 rounded-full text-[10px] font-black uppercase";
                        // Visual cue of deactivation
                        document.body.style.backgroundColor = "#0a0a0a";
                    }
                }, 1500);
            }, 1000);
        }
    </script>
</body>
</html>
