<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Neural Guardian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .app-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; width: 360px; height: 780px; background: #000; margin: 20px auto; position: relative; box-shadow: 0 0 100px rgba(59, 130, 246, 0.2); display: flex; flex-direction: column; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .terminal-text { font-family: 'Courier New', monospace; font-size: 10px; color: #4ade80; line-height: 1.4; }
        .scan-line { height: 3px; width: 100%; background: #3b82f6; position: absolute; top: 0; left: 0; animation: scan 2s infinite linear; display: none; box-shadow: 0 0 15px #3b82f6; z-index: 10; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-zinc-950">

    <div class="app-shell overflow-hidden p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-black italic tracking-tighter">SNOW<span class="text-blue-500">AI</span></h1>
            <div id="clock" class="text-xs font-bold text-blue-500">2:23 PM</div>
        </div>

        <div class="glass p-8 mb-4 text-center relative overflow-hidden">
            <div id="scanner" class="scan-line"></div>
            <input type="time" id="alarm-time" value="06:30" class="bg-transparent text-6xl font-black outline-none w-full text-center [color-scheme:dark]">
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-4" id="status-display">Guardian: Offline</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="glass p-4">
                <label class="text-[7px] font-black text-blue-500 uppercase">City</label>
                <input type="text" id="city" value="North Bay" class="bg-transparent text-xs font-bold w-full outline-none">
            </div>
            <div class="glass p-4">
                <label class="text-[7px] font-black text-blue-500 uppercase">Bus #</label>
                <input type="text" id="bus" value="154" class="bg-transparent text-xs font-bold w-full outline-none">
            </div>
        </div>

        <div class="space-y-3 flex-1">
            <button onclick="runAudit()" class="w-full bg-zinc-900 border border-zinc-800 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-zinc-800 transition">
                AI Intelligence Audit
            </button>
            <button id="guardian-btn" onclick="toggleGuardian()" class="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-xl shadow-blue-500/20 active:scale-95 transition-all">
                Set Neural Guardian
            </button>
        </div>

        <div id="report-box" class="hidden glass p-5 h-64 overflow-y-auto mt-4 animate-in fade-in slide-in-from-bottom-5">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black text-blue-500 uppercase">Neural Audit Report</span>
                <button onclick="closeReport()" class="text-zinc-500 text-xs">✕</button>
            </div>
            <div id="report-content" class="terminal-text space-y-2"></div>
            <div id="final-decision" class="mt-4 p-3 rounded-xl hidden"></div>
        </div>
    </div>

    <script>
        let guardianActive = false;
        let scanInterval;

        // CLOCK
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Background scanning logic
            if (guardianActive) {
                const alarmTime = document.getElementById('alarm-time').value;
                const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                
                // Scan every 2 minutes leading up to the alarm
                if (now.getSeconds() === 0 && now.getMinutes() % 2 === 0) {
                    console.log("Background Guardian Scan Running...");
                    silentAudit();
                }

                if (currentTime === alarmTime) {
                    triggerFinalVerdict();
                }
            }
        }, 1000);

        function toggleGuardian() {
            guardianActive = !guardianActive;
            const btn = document.getElementById('guardian-btn');
            const status = document.getElementById('status-display');
            
            if (guardianActive) {
                btn.innerText = "Guardian Active";
                btn.classList.add('pulse');
                status.innerText = "Monitoring: Scans every 120s";
                status.classList.add('text-blue-400');
            } else {
                btn.innerText = "Set Neural Guardian";
                btn.classList.remove('pulse');
                status.innerText = "Guardian: Offline";
                status.classList.remove('text-blue-400');
            }
        }

        async function runAudit() {
            const report = document.getElementById('report-box');
            const content = document.getElementById('report-content');
            const decision = document.getElementById('final-decision');
            const scanner = document.getElementById('scanner');
            
            report.classList.remove('hidden');
            decision.classList.add('hidden');
            scanner.style.display = 'block';
            content.innerHTML = "> Accessing live intelligence feeds...<br>";

            const addLine = (msg, delay) => {
                return new Promise(resolve => {
                    setTimeout(() => {
                        content.innerHTML += `> ${msg}<br>`;
                        report.scrollTop = report.scrollHeight;
                        resolve();
                    }, delay);
                });
            };

            await addLine("Connecting: NPSSTS Infrastructure...", 500);
            await addLine("Crawling: North Bay News / Environment Canada...", 700);
            await addLine("ALERT: Winter Storm Warning (Orange) detected.", 600);
            await addLine("ALERT: 10-20cm snowfall + Freezing Rain forecasted.", 400);
            await addLine("CALENDAR: Conflict found. Today is MARCH BREAK 2026.", 800);
            await addLine("VERDICT: No bus routes active in North Bay.", 500);

            setTimeout(() => {
                scanner.style.display = 'none';
                decision.classList.remove('hidden');
                decision.className = "mt-4 p-4 rounded-xl bg-blue-500/20 border border-blue-500/50";
                decision.innerHTML = `
                    <p class="text-[10px] font-black uppercase text-blue-400 mb-1">AI Verdict: SLEEP IN</p>
                    <p class="text-[9px] text-zinc-300">Schools are closed for March Break. Additionally, a major winter storm has closed Hwy 11 from North Bay to Longlac. Busing is suspended.</p>
                `;
            }, 500);
        }

        function silentAudit() {
            // Simulated silent background scan to keep system updated
            console.log("Guardian Scan: Environment Verified (March Break/Storm Active)");
        }

        function triggerFinalVerdict() {
            // This fires exactly at alarm time
            alert("SNOWDAY AI VERDICT: SLEEP IN. (March Break + Winter Storm Warning)");
            guardianActive = false;
            toggleGuardian();
        }

        function closeReport() {
            document.getElementById('report-box').classList.add('hidden');
        }
    </script>
</body>
</html>
