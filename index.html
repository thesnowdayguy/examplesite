<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .app-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; width: 360px; height: 780px; background: #000; margin: 20px auto; position: relative; box-shadow: 0 0 100px rgba(59, 130, 246, 0.15); display: flex; flex-direction: column; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .nav-btn.active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .terminal-text { font-family: 'Courier New', monospace; font-size: 9px; color: #4ade80; }
        .scan-line { height: 2px; width: 100%; background: #3b82f6; position: absolute; top: 0; left: 0; animation: scan 2s infinite linear; display: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-zinc-950">

    <div class="app-shell overflow-hidden">
        <div class="flex justify-between items-center p-6 pb-2">
            <h1 class="text-xl font-black italic tracking-tighter">SNOW<span class="text-blue-500">AI</span></h1>
            <div id="clock" class="text-xs font-bold text-zinc-500">12:00 PM</div>
        </div>

        <div class="flex px-6 space-x-6 border-b border-white/5 mb-4">
            <button onclick="switchTab('home')" id="tab-home" class="nav-btn active pb-2 text-[10px] font-black uppercase tracking-widest">Guardian</button>
            <button onclick="switchTab('settings')" id="tab-settings" class="nav-btn pb-2 text-[10px] font-black uppercase tracking-widest text-zinc-600">Account</button>
        </div>

        <div id="view-home" class="flex-1 px-6 overflow-y-auto space-y-4 pb-8">
            <div class="glass p-6 text-center relative overflow-hidden">
                <div id="scanner" class="scan-line"></div>
                <input type="time" id="alarm-time" value="06:30" class="bg-transparent text-5xl font-black outline-none w-full text-center [color-scheme:dark]">
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-widest mt-2" id="status-text">Ready for Audit</p>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="glass p-3">
                    <label class="text-[7px] font-black text-blue-500 uppercase">City</label>
                    <input type="text" id="city" value="North Bay" class="bg-transparent text-xs font-bold w-full outline-none">
                </div>
                <div class="glass p-3">
                    <label class="text-[7px] font-black text-blue-500 uppercase">Bus #</label>
                    <input type="text" id="bus" placeholder="123" class="bg-transparent text-xs font-bold w-full outline-none">
                </div>
            </div>

            <div id="audit-log" class="hidden glass p-4 h-40 overflow-y-auto terminal-text space-y-1">
                <p>> Initializing Neural Link...</p>
            </div>

            <div id="verdict-box" class="hidden glass p-4 border-l-4 border-blue-500 animate-pulse">
                <h2 id="verdict-title" class="text-2xl font-black italic"></h2>
                <p id="verdict-reason" class="text-[9px] text-zinc-400 mt-1"></p>
                <button onclick="stopAlarm()" class="w-full mt-3 bg-white text-black py-2 rounded-lg text-[9px] font-black uppercase">Kill Signal</button>
            </div>

            <button onclick="runShowcaseAudit()" id="audit-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95 transition-all">
                Execute Showcase Audit
            </button>
        </div>

        <div id="view-settings" class="hidden flex-1 px-6 space-y-4">
            <div class="glass p-4 flex items-center space-x-4">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">IT</div>
                <div>
                    <p class="text-xs font-black">Isaac Turnbull</p>
                    <p class="text-[8px] text-zinc-500 uppercase">Birchaven Resident</p>
                </div>
            </div>
            <div class="space-y-2">
                <div class="glass p-4 flex justify-between items-center cursor-pointer" onclick="showPaywall()">
                    <span class="text-[10px] font-bold">Multi-Zone Tracking</span>
                    <span class="text-[8px] bg-blue-500 px-2 py-0.5 rounded-full font-black uppercase">Pro</span>
                </div>
                <div class="glass p-4 flex justify-between items-center cursor-pointer" onclick="showPaywall()">
                    <span class="text-[10px] font-bold">Early Prediction Mode</span>
                    <span class="text-[8px] bg-blue-500 px-2 py-0.5 rounded-full font-black uppercase">Pro</span>
                </div>
            </div>
        </div>

        <div id="paywall" class="absolute inset-0 bg-black/95 z-50 hidden flex-col justify-center p-8 text-center">
            <h2 class="text-4xl font-black italic mb-2">GO <span class="text-blue-500">PRO</span></h2>
            <p class="text-zinc-500 text-[10px] mb-6">Unlock deep weather patterns and sub-route intelligence.</p>
            <button onclick="closePaywall()" class="bg-blue-600 w-full py-4 rounded-xl font-black text-xs mb-3 shadow-xl shadow-blue-500/30">$19.99/Year</button>
            <button onclick="closePaywall()" class="text-zinc-700 text-[8px] font-black uppercase">Restore Purchase</button>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const API_KEY = "AIzaSyAKMIdaa0-NqG5xQfv85WxyHPlSOtg_kO8";
        let audioCtx, alarmInt;

        window.switchTab = (tab) => {
            document.getElementById('view-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
            document.getElementById('tab-home').classList.toggle('active', tab === 'home');
            document.getElementById('tab-settings').classList.toggle('active', tab === 'settings');
        };

        window.showPaywall = () => document.getElementById('paywall').classList.replace('hidden', 'flex');
        window.closePaywall = () => document.getElementById('paywall').classList.replace('flex', 'hidden');

        // CLOCK
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        window.runShowcaseAudit = async () => {
            const log = document.getElementById('audit-log');
            const box = document.getElementById('verdict-box');
            const scanner = document.getElementById('scanner');
            const btn = document.getElementById('audit-btn');
            
            btn.disabled = true;
            log.classList.remove('hidden');
            box.classList.add('hidden');
            scanner.style.display = 'block';
            log.innerHTML = "<p>> Initiating Deep Scan...</p>";

            const addLog = (msg) => {
                log.innerHTML += `<p>> ${msg}</p>`;
                log.scrollTop = log.scrollHeight;
            };

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash", tools: [{ googleSearch: {} }] });
                
                addLog(`Targeting: ${document.getElementById('city').value}`);
                addLog("Crawling news sources...");
                addLog("Checking North Bay School Board (NPSSTS)...");

                const prompt = `Today is ${new Date().toDateString()}. City: ${document.getElementById('city').value}. Bus: ${document.getElementById('bus').value}.
                Search for: "School bus cancellations ${document.getElementById('city').value} today" and "March Break Ontario 2026".
                Evaluate source credibility. If it's a holiday or cancellation, SLEEP IN. Otherwise WAKE UP.
                Respond with: DECISION: [WAKE UP/SLEEP IN] REASON: [Short reason]`;

                const result = await model.generateContent(prompt);
                const response = result.response.text();
                
                addLog("Sources found: 4");
                addLog("Credibility Check: PASSED");
                addLog("Analyzing patterns...");

                setTimeout(() => {
                    scanner.style.display = 'none';
                    box.classList.remove('hidden');
                    const isSleep = response.toUpperCase().includes("SLEEP");
                    document.getElementById('verdict-title').innerText = isSleep ? "SLEEP IN" : "WAKE UP";
                    document.getElementById('verdict-title').className = `text-2xl font-black italic ${isSleep ? 'text-blue-500' : 'text-red-600'}`;
                    document.getElementById('verdict-reason').innerText = response.split("REASON:")[1] || "Logic verified.";
                    btn.disabled = false;
                    if(!isSleep) playAlarm();
                }, 1500);

            } catch (err) {
                addLog("!! ERROR: Neural link timeout.");
                btn.disabled = false;
            }
        };

        function playAlarm() {
            audioCtx = new AudioContext();
            alarmInt = setInterval(() => {
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.value = 800;
                const g = audioCtx.createGain();
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            }, 800);
        }

        window.stopAlarm = () => {
            clearInterval(alarmInt);
            document.getElementById('verdict-box').classList.add('hidden');
        };
    </script>
</body>
</html>
