<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Autonomous Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; width: 360px; height: 740px; background: #000; margin: 20px auto; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 80px rgba(59, 130, 246, 0.15); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .console { font-family: 'Courier New', monospace; font-size: 10px; color: #4ade80; height: 160px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.6); display: none; }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen">

    <div class="app-shell p-6">
        <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">SNOW<span class="text-blue-500">AI</span></h1>
            <div id="clock" class="text-xs font-black text-blue-500">2:30 PM</div>
        </div>

        <div class="glass p-8 mb-4 text-center">
            <input type="time" id="alarm-time" value="06:30" class="bg-transparent text-6xl font-black outline-none w-full text-center [color-scheme:dark]">
            <p id="system-mode" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-4">Manual Control</p>
        </div>

        <div class="space-y-3 mb-4">
            <button onclick="triggerAutonomousScan()" id="scan-btn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition">Scan Now</button>
            <button onclick="setGuardian()" id="guard-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition shadow-lg">Set Alarm</button>
        </div>

        <div id="ai-console" class="console border border-white/5 rounded-2xl"></div>

        <div id="verdict-ui" class="hidden mt-4 p-5 rounded-3xl border-l-4 border-blue-500 bg-white/5">
            <h2 id="verdict-text" class="text-3xl font-black italic uppercase"></h2>
            <p id="verdict-reason" class="text-[10px] text-zinc-400 mt-2 leading-relaxed"></p>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        const API_KEY = "AIzaSyAKMIdaa0-NqG5xQfv85WxyHPlSOtg_kO8"; // Use your actual key here

        let isGuardianSet = false;

        // CLOCK & BACKGROUND LOGIC
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Background scan leading up to alarm
            if (isGuardianSet && now.getSeconds() === 0 && now.getMinutes() % 10 === 0) {
                triggerAutonomousScan(true);
            }
        }, 1000);

        window.setGuardian = () => {
            isGuardianSet = !isGuardianSet;
            const btn = document.getElementById('guard-btn');
            const mode = document.getElementById('system-mode');
            if (isGuardianSet) {
                btn.innerText = "Guardian Enabled";
                btn.className = "w-full bg-zinc-800 text-blue-400 border border-blue-500/30 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest";
                mode.innerText = "Scanning corridors every 10m";
            } else {
                btn.innerText = "Set Alarm";
                btn.className = "w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg";
                mode.innerText = "Manual Control";
            }
        };

        window.triggerAutonomousScan = async (silent = false) => {
            const consoleBox = document.getElementById('ai-console');
            const verdictUI = document.getElementById('verdict-ui');
            
            if (!silent) {
                consoleBox.style.display = 'block';
                verdictUI.classList.add('hidden');
                consoleBox.innerHTML = "> Syncing with North Bay Transit Hub...<br>";
            }

            try {
                const genAI = new GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ 
                    model: "gemini-1.5-flash",
                    tools: [{ googleSearch: {} }] 
                });

                const today = new Date().toDateString();
                const prompt = `CRITICAL TASK: 
                Determine if school buses are cancelled for the Near North District School Board (NPSSTS) in North Bay for ${today}.
                
                STEPS:
                1. Search "NPSSTS North Bay bus cancellations ${today}".
                2. Check "Near North District School Board alerts".
                3. Determine if buses are cancelled due to weather, strikes, or holidays.
                
                OUTPUT: 
                DECISION: [WAKE UP or SLEEP IN]
                REASON: [Explain the official bus status found]`;

                if (!silent) consoleBox.innerHTML += "> Querying NPSSTS.ca API...<br>";
                
                const result = await model.generateContent(prompt);
                const response = result.response.text();
                
                if (!silent) {
                    consoleBox.innerHTML += "> Verdict received. Rendering...<br>";
                    setTimeout(() => {
                        verdictUI.classList.remove('hidden');
                        const isSleep = response.toUpperCase().includes("SLEEP IN");
                        document.getElementById('verdict-text').innerText = isSleep ? "SLEEP IN" : "WAKE UP";
                        document.getElementById('verdict-text').className = `text-3xl font-black italic uppercase ${isSleep ? 'text-blue-500' : 'text-red-600'}`;
                        document.getElementById('verdict-reason').innerText = response.split("REASON:")[1] || response;
                    }, 600);
                }
            } catch (err) {
                if (!silent) consoleBox.innerHTML += `<span class="text-red-500">> LINK FAILURE: Check API Key.</span>`;
            }
        };
    </script>
</body>
</html>
