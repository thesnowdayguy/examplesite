<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Full Logic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0c; color: #fff; transition: background 0.5s ease; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(15px); }
        .status-active { border-color: #34c759; box-shadow: 0 0 20px rgba(52, 199, 89, 0.1); }
        .status-killed { border-color: #ff3b30; box-shadow: 0 0 20px rgba(255, 59, 48, 0.1); }
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ff3b30 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tighter">SNOWDAY <span class="text-blue-500">PRO</span></h1>
            <p class="text-gray-500 text-xs mt-1 uppercase tracking-widest font-semibold">Startup Founder Edition</p>
        </div>

        <div class="glass p-8 rounded-[40px] space-y-5">
            <div>
                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Alert Portal URL</label>
                <input id="url-input" type="text" value="https://geoquery.npssts.ca/Alerts" 
                       class="w-full bg-white/5 p-4 rounded-2xl text-sm border border-white/10 outline-none focus:border-blue-500 transition">
                <p id="url-err" class="text-red-500 text-[10px] mt-2 hidden font-bold">⚠️ LINK INVALID - MUST START WITH HTTP:// OR HTTPS://</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">My Bus #</label>
                    <input id="bus-id" type="text" placeholder="Optional" class="w-full bg-white/5 p-4 rounded-2xl text-sm border border-white/10 outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block">Alarm Time</label>
                    <input id="alarm-time" type="time" value="07:00" class="w-full bg-white/5 p-4 rounded-2xl text-sm border border-white/10 outline-none focus:border-blue-500">
                </div>
            </div>

            <button onclick="runStartupLogic()" id="main-btn" 
                    class="w-full bg-blue-600 p-4 rounded-2xl font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-900/20 active:scale-95">
                Analyze & Arm Alarm
            </button>
        </div>

        <div id="status-card" class="glass p-6 rounded-[30px] hidden border-2 transition-all">
            <div class="flex justify-between items-center mb-4">
                <span id="scan-state" class="text-xs font-bold text-blue-500 uppercase tracking-tighter">Initializing Engine...</span>
                <div id="status-spinner" class="w-3 h-3 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <div id="console-log" class="text-[11px] font-mono text-gray-400 space-y-1 leading-relaxed"></div>
        </div>
    </div>

    <script>
        // SMART KEYWORD LIBRARY
        const CRITICAL_KEYWORDS = ["cancelled", "inclement weather", "buses not running", "closed", "emergency closure", "all buses cancelled"];

        async function runStartupLogic() {
            const url = document.getElementById('url-input').value;
            const busNum = document.getElementById('bus-id').value.trim();
            const card = document.getElementById('status-card');
            const log = document.getElementById('console-log');
            const btn = document.getElementById('main-btn');
            const urlErr = document.getElementById('url-err');

            // 1. URL VALIDATION FAILSAFE
            if (!url.startsWith('http')) {
                document.getElementById('url-input').classList.add('error-shake');
                urlErr.classList.remove('hidden');
                setTimeout(() => document.getElementById('url-input').classList.remove('error-shake'), 400);
                return;
            }
            urlErr.classList.add('hidden');

            // 2. RESET UI
            card.classList.remove('hidden');
            card.className = "glass p-6 rounded-[30px] border-2 transition-all";
            log.innerHTML = `<span class="text-blue-400">[SYSTEM]</span> Starting scan for ${url}...<br>`;
            btn.disabled = true;
            document.getElementById('status-spinner').classList.remove('hidden');

            try {
                // 3. PROXY FETCH (Bypasses CORS)
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Link Unreachable");
                
                const data = await response.json();
                const rawHTML = data.contents.toLowerCase();
                
                log.innerHTML += `<span class="text-blue-400">[SYSTEM]</span> Data fetched. Parsing HTML content...<br>`;

                let isCancelled = false;

                // 4. BUS FILTER LOGIC
                if (busNum) {
                    if (rawHTML.includes(busNum)) {
                        log.innerHTML += `<span class="text-yellow-400">[FILTER]</span> Found specific entry for Bus ${busNum}.<br>`;
                        
                        // Look at the text immediately following the bus number
                        const pos = rawHTML.indexOf(busNum);
                        const context = rawHTML.substring(pos, pos + 250); // Scan next 250 characters
                        
                        isCancelled = CRITICAL_KEYWORDS.some(word => context.includes(word));
                        
                        if (isCancelled) {
                            log.innerHTML += `<span class="text-red-400">[MATCH]</span> Cancellation detected for your specific route.<br>`;
                        } else {
                            log.innerHTML += `<span class="text-green-400">[SAFE]</span> Bus ${busNum} found but status is NOT cancelled.<br>`;
                        }
                    } else {
                        log.innerHTML += `<span class="text-gray-500">[WARN]</span> Bus ${busNum} not listed. Checking global alerts...<br>`;
                        // Fallback to global check
                        isCancelled = CRITICAL_KEYWORDS.some(word => rawHTML.includes(word));
                    }
                } else {
                    // 5. GLOBAL "ALL BUSES" LOGIC
                    isCancelled = CRITICAL_KEYWORDS.some(word => rawHTML.includes(word));
                    if (isCancelled) log.innerHTML += `<span class="text-red-400">[MATCH]</span> General system-wide cancellation found.<br>`;
                }

                // 6. KILLSWITCH TRIGGER
                setTimeout(() => {
                    document.getElementById('status-spinner').classList.add('hidden');
                    if (isCancelled) {
                        triggerKillswitch(card, log);
                    } else {
                        triggerAlarmArmed(card, log);
                    }
                }, 800);

            } catch (err) {
                log.innerHTML += `<span class="text-red-500">[ERROR]</span> LINK INVALID OR SITE BLOCKED.<br>`;
                document.getElementById('scan-state').innerText = "LINK INVALID";
                document.getElementById('status-spinner').classList.add('hidden');
            }
            btn.disabled = false;
        }

        function triggerKillswitch(card, log) {
            card.classList.add('status-killed');
            document.getElementById('scan-state').innerText = "ALARM DEACTIVATED";
            document.body.style.backgroundColor = "#1a0808";
            log.innerHTML += `<br><span class="text-red-500 font-bold">CRITICAL: SNOW DAY CONFIRMED. SLEEP IN MODE ON.</span>`;
        }

        function triggerAlarmArmed(card, log) {
            card.classList.add('status-active');
            document.getElementById('scan-state').innerText = "ALARM ARMED";
            document.body.style.backgroundColor = "#081a08";
            log.innerHTML += `<br><span class="text-green-500 font-bold">SAFE: NO MATCHES FOUND. ALARM WILL TRIGGER NORMALLY.</span>`;
        }
    </script>
</body>
</html>
