<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Functional Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        input { background: rgba(255,255,255,0.05) !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; transition: all 0.2s; }
        input:focus { border-color: #3b82f6 !important; outline: none; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        .error-shake { border-color: #ef4444 !important; animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-bold tracking-tight">SnowDay <span class="text-blue-500">AI</span></h1>
            <p class="text-gray-400 text-sm mt-1">Universal School Board Scanner</p>
        </div>

        <div class="glass p-8 rounded-[40px] space-y-5">
            <div>
                <label class="text-[10px] font-black uppercase text-gray-500 mb-2 block tracking-widest">Source URL</label>
                <input id="target-url" type="text" placeholder="https://geoquery.npssts.ca/Alerts" 
                       class="w-full p-4 rounded-2xl text-sm" value="https://geoquery.npssts.ca/Alerts">
                <p id="url-error" class="text-red-500 text-[10px] mt-2 hidden font-bold uppercase tracking-tight">⚠️ Invalid URL - Please include http:// or https://</p>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-500 mb-2 block tracking-widest">Keyword</label>
                    <input id="keyword" type="text" placeholder="Cancelled" class="w-full p-4 rounded-2xl text-sm" value="Cancelled">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-gray-500 mb-2 block tracking-widest">Alarm</label>
                    <input id="alarm-time" type="time" class="w-full p-4 rounded-2xl text-sm" value="07:00">
                </div>
            </div>

            <div class="pt-4">
                <button id="scan-btn" onclick="performScan()" 
                        class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                    Start Scanning Engine
                </button>
            </div>
        </div>

        <div id="status-card" class="glass p-6 rounded-[30px] hidden text-center border-blue-500/20">
            <div id="status-spinner" class="inline-block w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-2"></div>
            <p id="status-text" class="text-sm text-gray-400 font-medium italic italic">Checking source...</p>
            <div id="final-result" class="text-xl font-bold mt-2"></div>
        </div>
    </div>

    <script>
        // URL Validation Logic
        function isValidHttpUrl(string) {
            let url;
            try {
                url = new URL(string);
            } catch (_) {
                return false;  
            }
            return url.protocol === "http:" || url.protocol === "https:";
        }

        async function performScan() {
            const urlInput = document.getElementById('target-url');
            const errorText = document.getElementById('url-error');
            const statusCard = document.getElementById('status-card');
            const statusText = document.getElementById('status-text');
            const finalResult = document.getElementById('final-result');
            const keyword = document.getElementById('keyword').value.toLowerCase();

            // 1. Validate URL
            if (!isValidHttpUrl(urlInput.value)) {
                urlInput.classList.add('error-shake');
                errorText.classList.remove('hidden');
                setTimeout(() => urlInput.classList.remove('error-shake'), 400);
                return;
            } else {
                errorText.classList.add('hidden');
            }

            // 2. Start Animation
            statusCard.classList.remove('hidden');
            statusText.innerText = `Attempting to reach ${new URL(urlInput.value).hostname}...`;
            finalResult.innerText = "";

            try {
                // 3. Real Fetch Logic using Puter to bypass CORS
                const response = await puter.net.fetch(urlInput.value);
                const text = await response.text();
                
                statusText.innerText = "Parsing page content...";
                
                setTimeout(() => {
                    document.getElementById('status-spinner').classList.add('hidden');
                    
                    if (text.toLowerCase().includes(keyword)) {
                        // SNOW DAY DETECTED
                        finalResult.innerHTML = `<span class="text-red-500 uppercase">🚨 ALARM DEACTIVATED</span><br><span class="text-xs text-gray-400 mt-2 block">"${keyword}" found in data.</span>`;
                        document.body.style.backgroundColor = "#1a0505";
                    } else {
                        // NO SNOW DAY
                        finalResult.innerHTML = `<span class="text-green-500 uppercase">☀️ ALARM ARMED</span><br><span class="text-xs text-gray-400 mt-2 block">No matching keywords found.</span>`;
                        document.body.style.backgroundColor = "#051a05";
                    }
                }, 1000);

            } catch (err) {
                statusText.innerText = "Connection Failed";
                finalResult.innerHTML = `<span class="text-orange-500 uppercase">Server Blocked</span><br><span class="text-[10px] text-gray-500">Site has anti-bot protection.</span>`;
                document.getElementById('status-spinner').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
