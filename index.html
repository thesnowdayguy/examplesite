<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | GPT-4o Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #020202; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; }
        .app-shell { border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; width: 360px; height: 740px; background: #000; margin: 20px auto; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 80px rgba(59, 130, 246, 0.2); }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .console { font-family: 'Courier New', monospace; font-size: 10px; color: #4ade80; height: 160px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.6); display: none; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="bg-zinc-950 flex items-center justify-center min-h-screen">

    <div class="app-shell p-6">
        <div class="flex justify-between items-center mb-6 px-2">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">SNOW<span class="text-blue-500">AI</span></h1>
            <div id="clock" class="text-xs font-black text-blue-500">--:--</div>
        </div>

        <div class="glass p-8 mb-4 text-center">
            <input type="time" id="alarm-time" value="06:30" class="bg-transparent text-6xl font-black outline-none w-full text-center [color-scheme:dark]">
            <p id="system-mode" class="text-[9px] text-zinc-500 font-bold uppercase tracking-widest mt-4">System Disarmed</p>
        </div>

        <div class="space-y-3 mb-4">
            <button onclick="runScan()" id="scan-btn" class="w-full bg-white text-black py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition">Scan Now</button>
            <button onclick="toggleAlarm()" id="guard-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 transition shadow-lg">Set Alarm</button>
        </div>

        <div id="ai-console" class="console border border-white/5 rounded-2xl"></div>

        <div id="verdict-ui" class="hidden mt-4 p-5 rounded-3xl border-l-4 border-blue-500 bg-white/5 animate-in fade-in zoom-in duration-300">
            <h2 id="verdict-text" class="text-3xl font-black italic uppercase"></h2>
            <p id="verdict-reason" class="text-[10px] text-zinc-400 mt-2 leading-relaxed"></p>
        </div>
    </div>

    <script>
        const API_KEY = "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"; 
        let isArmed = false;

        // CLOCK
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Background scan logic: Check every 10 mins if armed
            if (isArmed && now.getSeconds() === 0 && now.getMinutes() % 10 === 0) {
                runScan(true);
            }
        }, 1000);

        function toggleAlarm() {
            isArmed = !isArmed;
            const btn = document.getElementById('guard-btn');
            const mode = document.getElementById('system-mode');
            if (isArmed) {
                btn.innerText = "Guardian Active";
                btn.classList.add('pulse');
                mode.innerText = "Auto-Scanning NPSSTS Hub";
            } else {
                btn.innerText = "Set Alarm";
                btn.classList.remove('pulse');
                mode.innerText = "System Disarmed";
            }
        }

        async function runScan(silent = false) {
            const consoleBox = document.getElementById('ai-console');
            const verdictUI = document.getElementById('verdict-ui');
            
            if (!silent) {
                consoleBox.style.display = 'block';
                verdictUI.classList.add('hidden');
                consoleBox.innerHTML = "> Connecting to OpenAI GPT-4o...<br>";
            }

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o",
                        messages: [{
                            role: "system",
                            content: `You are a North Bay busing expert. Today is ${new Date().toDateString()}. Use your internal search capability to check NPSSTS.ca and North Bay news for bus cancellations or March Break holidays. 
                            Output exactly in this format:
                            DECISION: [WAKE UP or SLEEP IN]
                            REASON: [Short detail on buses/holidays]`
                        }]
                    })
                });

                const data = await response.json();
                const aiResult = data.choices[0].message.content;

                if (!silent) {
                    consoleBox.innerHTML += "> Response received. Parsing corridors...<br>";
                    setTimeout(() => {
                        verdictUI.classList.remove('hidden');
                        const isSleep = aiResult.toUpperCase().includes("SLEEP IN");
                        document.getElementById('verdict-text').innerText = isSleep ? "SLEEP IN" : "WAKE UP";
                        document.getElementById('verdict-text').className = `text-3xl font-black italic uppercase ${isSleep ? 'text-blue-500' : 'text-red-600'}`;
                        document.getElementById('verdict-reason').innerText = aiResult.split("REASON:")[1] || aiResult;
                    }, 500);
                }
            } catch (err) {
                if (!silent) consoleBox.innerHTML += `<span class="text-red-500">> API LINK ERROR: Check connection.</span>`;
            }
        }
    </script>
</body>
</html>
