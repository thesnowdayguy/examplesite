<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnowDay AI | Logic Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body { background-color: #05070a; color: #f0f0f0; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(20px); }
        .status-killed { border-color: #ff3b30; background: rgba(255, 59, 48, 0.05); box-shadow: 0 0 30px rgba(255, 59, 48, 0.1); }
        .status-armed { border-color: #34c759; background: rgba(52, 199, 89, 0.05); box-shadow: 0 0 30px rgba(52, 199, 89, 0.1); }
        input:focus { border-color: #3b82f6 !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-black tracking-tighter italic">SNOWDAY <span class="text-blue-500">AI</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">v2.1 High-Performance Edition</p>
        </div>

        <div id="console-box" class="glass p-8 rounded-[40px] space-y-6 transition-all duration-500">
            <div>
                <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">School Board Portal</label>
                <input id="target-url" type="text" value="https://geoquery.npssts.ca/Alerts" 
                       class="w-full bg-black/40 p-4 rounded-2xl mt-1 text-sm border border-white/10 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Bus #</label>
                    <input id="bus-id" type="text" placeholder="Optional" 
                           class="w-full bg-black/40 p-4 rounded-2xl mt-1 text-sm border border-white/10 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-500 uppercase ml-2">Alarm Set</label>
                    <input type="time" value="07:00" class="w-full bg-black/40 p-4 rounded-2xl mt-1 text-sm border border-white/10 outline-none text-gray-400">
                </div>
            </div>

            <button onclick="executeLogic()" id="action-btn" 
                    class="w-full bg-blue-600 p-5 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-blue-500 active:scale-95 transition-all shadow-xl shadow-blue-900/20">
                Sync & Run Engine
            </button>

            <div id="log-window" class="hidden space-y-2 pt-4 border-t border-white/5 font-mono text-[10px] text-gray-500">
                <div id="log-content"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'e8e2f18c-513a-480d-b691-cbdbe9050598'; // Your specific key
        const KEYWORDS = ["cancelled", "inclement weather", "not running", "closed", "emergency closure"];

        async function executeLogic() {
            const url = document.getElementById('target-url').value;
            const bus = document.getElementById('bus-id').value.trim();
            const consoleBox = document.getElementById('console-box');
            const logBox = document.getElementById('log-window');
            const logContent = document.getElementById('log-content');
            const btn = document.getElementById('action-btn');

            // 1. Initializing
            logBox.classList.remove('hidden');
            logContent.innerHTML = `<span class="text-blue-500">>></span> Initializing WebScraping.ai Stealth Engine...<br>`;
            btn.innerText = "SCANNING...";
            btn.disabled = true;

            try {
                // 2. Pro Scraper Fetch (Bypassing school board firewalls)
                const fetchUrl = `https://api.webscraping.ai/v1/get?api_key=${API_KEY}&url=${encodeURIComponent(url)}`;
                const response = await fetch(fetchUrl);
                
                if (!response.ok) throw new Error("Connection Refused");
                
                const html = (await response.text()).toLowerCase();
                logContent.innerHTML += `<span class="text-blue-500">>></span> Remote data synchronized.<br>`;

                let cancellationDetected = false;

                // 3. Logic: Bus-Specific vs. Global
                if (bus) {
                    logContent.innerHTML += `<span class="text-blue-500">>></span> Targeting Bus ${bus} data points...<br>`;
                    if (html.includes(bus)) {
                        const index = html.indexOf(bus);
                        const context = html.substring(index, index + 300); // Analyze the 300 characters after the bus ID
                        cancellationDetected = KEYWORDS.some(word => context.includes(word));
                    } else {
                        logContent.innerHTML += `<span class="text-yellow-500">>></span> Bus ${bus} not listed. checking general alerts...<br>`;
                        cancellationDetected = KEYWORDS.some(word => html.includes(word) && html.includes("all buses"));
                    }
                } else {
                    logContent.innerHTML += `<span class="text-blue-500">>></span> Running global system scan...<br>`;
                    cancellationDetected = KEYWORDS.some(word => html.includes(word));
                }

                // 4. Killswitch / Armed States
                setTimeout(() => {
                    if (cancellationDetected) {
                        consoleBox.className = "glass p-8 rounded-[40px] space-y-6 transition-all duration-500 status-killed";
                        logContent.innerHTML += `<br><span class="text-red-500 font-black tracking-widest">[KILLSWITCH] CANCELLATION DETECTED. ALARM DISABLED.</span>`;
                        btn.innerText = "ALARM KILLED";
                    } else {
                        consoleBox.className = "glass p-8 rounded-[40px] space-y-6 transition-all duration-500 status-armed";
                        logContent.innerHTML += `<br><span class="text-green-500 font-black tracking-widest">[READY] NO CANCELLATIONS. ALARM ARMED.</span>`;
                        btn.innerText = "ALARM ACTIVE";
                    }
                }, 1000);

            } catch (err) {
                logContent.innerHTML += `<span class="text-red-500">>> FATAL ERROR: ${err.message}</span><br>`;
                btn.innerText = "SYNC FAILED";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
